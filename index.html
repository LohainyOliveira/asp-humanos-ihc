<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <title>Admissão de Emergência</title>

    <style>
        /* ===============================
           PADRONIZAÇÃO VISUAL (Consistência)
           =============================== */

        body {
            font-family: Arial, sans-serif;
            background-color: #f4f6f8;
            margin: 0;
            padding: 20px;
        }

        h1 {
            text-align: center;
        }

        form {
            max-width: 800px;
            margin: auto;
            background: white;
            padding: 25px;
            border-radius: 8px;
            box-shadow: 0 4px 10px rgba(0,0,0,0.1);
        }

        /* ===============================
           GESTALT - PROXIMIDADE E AGRUPAMENTO
           Cada fieldset representa um "chunk"
           =============================== */

        fieldset {
            border: 1px solid #ddd;
            margin-bottom: 20px;
            padding: 15px;
            border-radius: 6px;
        }

        legend {
            font-weight: bold;
        }

        label {
            display: block;
            margin-top: 10px;
        }

        input, textarea {
            width: 100%;
            padding: 8px;
            margin-top: 4px;
            border-radius: 4px;
            border: 1px solid #ccc;
        }

        /* ===============================
           ERRO COM REDUNDÂNCIA VISUAL
           Não usar apenas cor (acessibilidade)
           =============================== */

        .erro {
            border: 2px solid #d93025;
        }

        .mensagem-erro {
            color: #d93025;
            font-size: 0.9em;
            margin-top: 3px;
        }

        /* ===============================
           AÇÃO PRIMÁRIA COM ALTO CONTRASTE
           Apenas o botão principal usa destaque
           =============================== */

        .botao-principal {
            background-color: #0057b8;
            color: white;
            padding: 12px;
            border: none;
            border-radius: 5px;
            cursor: pointer;
            font-size: 16px;
            margin-top: 15px;
        }

        .botao-principal:hover {
            background-color: #003f87;
        }

        /* Progressive Disclosure */
        #areaAdicional {
            display: none;
        }

    </style>
</head>
<body>

<h1>Admissão de Emergência</h1>

<!-- 
Foco e Atenção:
Não há menus, banners, animações ou distrações.
Interface limpa e direta para situação de estresse.
-->

<form id="formAdmissao">

    <!-- ===============================
         GESTALT + CHUNKING
         Grupo 1 - Dados Pessoais
         =============================== -->
    <fieldset>
        <legend>Dados Pessoais</legend>

        <label for="nome">Nome Completo</label>
        <input type="text" id="nome" required>

        <label for="idade">Idade</label>
        <input type="number" id="idade" required>

        <!-- 
        Memória e Chunking:
        CPF com máscara para reduzir carga na memória de curto prazo.
        -->
        <label for="cpf">CPF</label>
        <input type="text" id="cpf" maxlength="14" required>
        <div id="erroCpf" class="mensagem-erro"></div>
    </fieldset>

    <!-- ===============================
         Grupo 2 - Contato Emergência
         =============================== -->
    <fieldset>
        <legend>Contato de Emergência</legend>

        <label for="nomeContato">Nome do Contato</label>
        <input type="text" id="nomeContato" required>

        <label for="telefone">Telefone</label>
        <input type="text" id="telefone" maxlength="15" required>
    </fieldset>

    <!-- ===============================
         Grupo 3 - Condição Médica
         =============================== -->
    <fieldset>
        <legend>Condição Médica / Sintomas Iniciais</legend>

        <label for="sintomas">Descreva os Sintomas</label>
        <textarea id="sintomas" rows="3" required></textarea>

        <!-- Progressive Disclosure -->
        <button type="button" onclick="mostrarMais()">Adicionar Informações Complementares</button>

        <div id="areaAdicional">
            <label for="historico">Histórico Médico Relevante</label>
            <textarea id="historico" rows="3"></textarea>
        </div>

    </fieldset>

    <button type="submit" class="botao-principal">
        Confirmar Admissão
    </button>

</form>

<script>
/* =====================================
   Máscara CPF - Redução da Carga Cognitiva
   ===================================== */

document.getElementById("cpf").addEventListener("input", function(e) {
    let valor = e.target.value.replace(/\D/g, "");
    valor = valor.replace(/(\d{3})(\d)/, "$1.$2");
    valor = valor.replace(/(\d{3})(\d)/, "$1.$2");
    valor = valor.replace(/(\d{3})(\d{1,2})$/, "$1-$2");
    e.target.value = valor;
});

/* Máscara Telefone */
document.getElementById("telefone").addEventListener("input", function(e) {
    let valor = e.target.value.replace(/\D/g, "");
    valor = valor.replace(/^(\d{2})(\d)/g, "($1) $2");
    valor = valor.replace(/(\d{5})(\d)/, "$1-$2");
    e.target.value = valor;
});

/* =====================================
   Validação com redundância textual
   ===================================== */

document.getElementById("formAdmissao").addEventListener("submit", function(e) {
    e.preventDefault();

    let cpf = document.getElementById("cpf");
    let erroCpf = document.getElementById("erroCpf");

    if (cpf.value.length < 14) {
        cpf.classList.add("erro");
        erroCpf.textContent = "Erro: CPF incompleto. Verifique os números digitados.";
    } else {
        cpf.classList.remove("erro");
        erroCpf.textContent = "";
        alert("Admissão registrada com sucesso!");
    }
});

/* Progressive Disclosure */
function mostrarMais() {
    document.getElementById("areaAdicional").style.display = "block";
}
</script>

</body>
</html>
